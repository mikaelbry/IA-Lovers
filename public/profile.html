<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mi Perfil</title>

<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/post.css">
<link rel="stylesheet" href="assets/css/profile.css">
<link rel="stylesheet" href="assets/css/header.css">

</head>
<body>

<nav class="navbar"></nav>

<section class="feed">
<div id="profile"></div>
<div id="posts"></div>
</section>

<script src="assets/js/header.js"></script>
<script defer src="assets/js/posts.js"></script>

<script>
fetch("../api/index.php/users/profile", {
headers:{
"Authorization":"Bearer " + localStorage.getItem("token")
}
})
.then(res=>res.json())
.then(data=>{

document.getElementById("profile").innerHTML = `
<img src="assets/images/logo.jpg" class="profile-pic">

<h2>${data.user.username} (Tú)</h2>

<p>Email: ${data.user.email}</p>

<p><strong>Seguidores:</strong> ${data.followers}</p>

<hr>
`;

renderPosts(data.posts,"posts");

});

</script>

</body>
</html>
