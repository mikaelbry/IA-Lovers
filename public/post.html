<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Post</title>
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/post.css">
<link rel="stylesheet" href="assets/css/header.css">
<style>
.post-meta { font-size:13px; color:#777; margin-bottom:10px; }
.post-tags { margin-top:10px; }
.post-tags .tag { background:#eee; padding:5px 10px; border-radius:20px; font-size:12px; margin-right:5px; }
.comment-date { font-size:12px; color:#888; margin-bottom:5px; }
.reply-back { margin-bottom:15px; background:#2481ce;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;}
.comment-actions button, .comment-actions .view-replies { font-size:13px; color:#2481ce; background:none;border:none;cursor:pointer;margin-right:10px;}
</style>
</head>
<body>

<nav class="navbar"></nav>

<section class="feed">
    <button class="back-btn" onclick="goBack()">← Volver</button>
    <div id="post"></div>
    <div id="comments"></div>
</section>

<script src="assets/js/header.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const postId = params.get("id");
const token = localStorage.getItem("token");

let allComments = [];
let commentStack = []; // Pila de hilos

/* ================= DATE ================= */
function formatDate(dateString){
    const d = new Date(dateString);
    return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')} - ${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
}

/* ================= LOAD POST ================= */
fetch("../api/index.php/posts/show?id="+postId,{
    headers: token ? { "Authorization":"Bearer "+token } : {}
})
.then(res=>res.json())
.then(data=>{
    const post = data.post;
    const tagsHTML = post.tags ? post.tags.split(',').map(t=>`<span class="tag">#${t.trim()}</span>`).join(' ') : '';
    document.getElementById("post").innerHTML = `
        <h2>${post.username}</h2>
        <div class="post-meta">${formatDate(post.created_at)}</div>
        <img src="${post.file_path}" class="post-image2">
        <div class="post-title">${post.title}</div>
        <div class="post-description">${post.description}</div>
        <div class="post-tags">${tagsHTML}</div>
        <div class="post-actions">
            <button id="likeBtn" class="like-btn ${post.liked_by_user==1?'liked':''}" onclick="toggleLike()">
                ❤️ <span id="likeCount">${post.likes_count}</span>
            </button>
            <span id="commentCount">💬 ${post.comments_count}</span>
        </div>
        <hr>
    `;
    allComments = data.comments;
    renderComments(null); // comentarios raíz
});

/* ================= LIKE ================= */
function toggleLike(){
    fetch("../api/index.php/posts/toggle-like",{
        method:"POST",
        headers:{ "Content-Type":"application/json","Authorization":"Bearer "+token },
        body:JSON.stringify({post_id:postId})
    }).then(r=>r.json())
      .then(data=>{
        const btn = document.getElementById("likeBtn");
        const countEl = document.getElementById("likeCount");
        let count = parseInt(countEl.textContent);
        if(data.liked){ btn.classList.add("liked"); countEl.textContent = count+1; }
        else{ btn.classList.remove("liked"); countEl.textContent = count-1; }
    });
}

/* ================= BUILD TREE ================= */
function buildTree(comments){
    const map = {}; comments.forEach(c=>{ c.children=[]; map[c.id]=c; });
    const roots = [];
    comments.forEach(c=>{ if(c.parent_id) map[c.parent_id]?.children.push(c); else roots.push(c); });
    return roots;
}

/* ================= COUNT DESCENDANTS ================= */
function countAllDescendants(comment){
    let count = comment.children.length;
    comment.children.forEach(c=>count+=countAllDescendants(c));
    return count;
}

/* ================= RENDER COMMENTS ================= */
function renderComments(parentId){
    const container = document.getElementById("comments");
    container.innerHTML = "";

    if(commentStack.length>0){
        const backBtn = document.createElement("button");
        backBtn.className="reply-back";
        backBtn.textContent="← Volver";
        backBtn.onclick=goBackComment;
        container.appendChild(backBtn);
    }

    let commentsToRender;
    let parentComment = null;

    if(parentId){
        parentComment = allComments.find(c=>c.id===parentId);
        commentsToRender = parentComment ? parentComment.children : [];
        if(parentComment){
            const parentDiv = renderSingleComment(parentComment,true);
            container.appendChild(parentDiv);
            renderFormAfter(parentDiv,parentId); // formulario justo debajo del comentario principal
        }
    } else {
        commentsToRender = buildTree(allComments);
        renderForm(container,null,true); // formulario raíz arriba
    }

    commentsToRender.forEach(c=>{
        const div = renderSingleComment(c,false);
        container.appendChild(div);
    });
}

function renderSingleComment(comment,isParent=false){
    const div=document.createElement("div");
    div.className="comment";
    div.style.marginLeft = isParent ? "0px":"20px";
    const descendants = countAllDescendants(comment);
    div.innerHTML = `<strong>${comment.username}</strong>
        <div class="comment-date">${formatDate(comment.created_at)}</div>
        <p>${comment.content}</p>
        <div class="comment-actions">
            <button onclick="enterThread(${comment.id})">Responder</button>
            ${descendants>0?`<span class="view-replies" onclick="enterThread(${comment.id})">${descendants} respuestas</span>`:""}
        </div>`;
    return div;
}

/* ================= FORM ================= */
function renderForm(container,parentId,isRoot=false){
    const form = document.createElement("div");
    form.className="comment-form";
    form.innerHTML=`<textarea id="commentInput" placeholder="Escribe un comentario..."></textarea>
                    <button onclick="addComment(${parentId})">Comentar</button>`;
    if(isRoot) container.prepend(form);
    else container.appendChild(form);
}

function renderFormAfter(commentDiv,parentId){
    const form = document.createElement("div");
    form.className="comment-form";
    form.innerHTML=`<textarea id="commentInput" placeholder="Escribe un comentario..."></textarea>
                    <button onclick="addComment(${parentId})">Comentar</button>`;
    commentDiv.after(form); // justo debajo del comentario principal
}

/* ================= ENTER THREAD ================= */
function enterThread(commentId){
    commentStack.push(commentId);
    renderComments(commentId);
}

/* ================= GO BACK THREAD ================= */
function goBackComment(){
    commentStack.pop();
    const lastId = commentStack[commentStack.length-1] || null;
    renderComments(lastId);
}

/* ================= ADD COMMENT ================= */
function addComment(parentId=null){
    const input=document.querySelector("#commentInput");
    const content=input.value.trim();
    if(!content) return;
    fetch("../api/index.php/comments/create",{
        method:"POST",
        headers:{ "Content-Type":"application/json","Authorization":"Bearer "+token },
        body:JSON.stringify({ post_id:postId, content, parent_id:parentId })
    }).then(r=>r.json()).then(data=>{
        allComments.push(data.comment);
        document.getElementById("commentCount").textContent="💬 "+data.comments_count;
        // Insertar la respuesta inmediatamente en el hilo activo
        if(parentId){
            const parent=allComments.find(c=>c.id===parentId);
            if(parent) parent.children.push(data.comment);
        }
        renderComments(parentId);
    });
}

function goBack(){ window.history.back(); }

</script>
</body>
</html>
