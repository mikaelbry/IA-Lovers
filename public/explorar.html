<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Explorar</title>

<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/post.css">

<style>
.explore-header {
    margin-bottom: 30px;
}

.explore-filters {
    display: flex;
    gap: 15px;
    margin-top: 15px;
    flex-wrap: wrap;
}

.explore-filters input,
.explore-filters select {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.explore-filters button {
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
}

.post-date {
    font-size: 13px;
    color: #777;
    margin-bottom: 8px;
}
</style>

</head>
<body>

<nav class="navbar">
<div class="logo">IA-<span class="highlight">Lovers</span></div>
<div id="nav-auth"></div>
</nav>

<section class="feed">

<div class="explore-header">
<h2>Explorar</h2>

<div class="explore-filters">
<input type="text" id="searchTitle" placeholder="Buscar por título">
<input type="text" id="searchTag" placeholder="Filtrar por tag">

<select id="orderSelect">
<option value="recent">Más reciente</option>
<option value="oldest">Más viejo</option>
<option value="likes">Más likes</option>
</select>

<button onclick="loadPosts()">Buscar</button>
</div>
</div>

<div id="posts"></div>

</section>

<script src="assets/js/header.js"></script>
<script src="assets/js/posts.js"></script>

<script>
function buildURL(cursor){

    const title = document.getElementById("searchTitle").value;
    const tag = document.getElementById("searchTag").value;
    const order = document.getElementById("orderSelect").value;

    let url = `/IA-Lovers/api/posts?type=explore&title=${encodeURIComponent(title)}&tag=${encodeURIComponent(tag)}&order=${order}`;

    if(cursor){
        url += `&cursor=${cursor}`;
    }

    return url;
}

initInfiniteScroll(buildURL,"posts");
</script>

</body>
</html>
