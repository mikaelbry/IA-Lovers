<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Explorar</title>
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/post.css">

<style>
.explore-header {
    margin-bottom: 30px;
}

.explore-filters {
    display: flex;
    gap: 15px;
    margin-top: 15px;
    flex-wrap: wrap;
}

.explore-filters input,
.explore-filters select {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.explore-filters button {
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
}

.post-date {
    font-size: 13px;
    color: #777;
    margin-bottom: 8px;
}
</style>
</head>
<body>

<nav class="navbar">
<div class="logo">IA-<span class="highlight">Lovers</span></div>
<div id="nav-auth"></div>
</nav>

<section class="feed">

    <div class="explore-header">
        <h2>Explorar</h2>

        <div class="explore-filters">
            <input type="text" id="searchTitle" placeholder="Buscar por título">
            <input type="text" id="searchTag" placeholder="Filtrar por tag">
            <select id="orderSelect">
                <option value="recent">Más reciente</option>
                <option value="oldest">Más viejo</option>
                <option value="likes">Más likes</option>
            </select>
            <button onclick="loadPosts()">Buscar</button>
        </div>
    </div>

    <div id="posts"></div>

</section>

<script src="assets/js/header.js"></script>

<script>
const token = localStorage.getItem("token");

function formatDate(dateString) {
    const date = new Date(dateString);

    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const year = date.getFullYear();
    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');

    return `${hours}:${minutes} - ${day}/${month}/${year}`;
}

function loadPosts() {

    const title = document.getElementById("searchTitle").value;
    const tag = document.getElementById("searchTag").value;
    const order = document.getElementById("orderSelect").value;

    let url = `../api/index.php/posts/latest?title=${encodeURIComponent(title)}&tag=${encodeURIComponent(tag)}&order=${order}`;

    fetch(url, {
        headers: token ? { "Authorization": "Bearer " + token } : {}
    })
    .then(res => res.json())
    .then(posts => {

        const container = document.getElementById("posts");
        container.innerHTML = "";

        posts.forEach(post => {

            const tagsHTML = post.tags
                ? post.tags.split(',').map(t => `<span class="tag">#${t}</span>`).join(' ')
                : '';

            container.innerHTML += `
                <div class="post">

                    <div class="post-header">
                        <a href="user.html?id=${post.user_id}">
                            ${post.username}
                        </a>
                    </div>

                    <div class="post-date">
                        ${formatDate(post.created_at)}
                    </div>

                    <img src="${post.file_path}"
                         class="post-image"
                         onclick="goToPost(${post.id})">

                    <div class="post-title">
                        ${post.title}
                    </div>

                    <div class="post-tags">
                        ${tagsHTML}
                    </div>

                    <div class="post-actions">
                        <button 
                            class="like-btn ${post.liked_by_user == 1 ? 'liked' : ''}"
                            onclick="toggleLike(event, ${post.id}, this)">
                            ❤️ <span>${post.likes_count}</span>
                        </button>

                        <button class="comment-count"
                                onclick="goToPost(${post.id})">
                            💬 ${post.comments_count}
                        </button>
                    </div>
                </div>
            `;
        });
    });
}

function toggleLike(event, id, btn) {

    event.stopPropagation();

    if (!token) {
        window.location.href = "login.html";
        return;
    }

    fetch("../api/index.php/posts/toggle-like", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ post_id: id })
    })
    .then(r => r.json())
    .then(data => {

        const span = btn.querySelector("span");
        let count = parseInt(span.textContent);

        if (data.liked) {
            btn.classList.add("liked");
            span.textContent = count + 1;
        } else {
            btn.classList.remove("liked");
            span.textContent = count - 1;
        }
    });
}

function goToPost(id) {
    window.location.href = "post.html?id=" + id;
}

loadPosts();
</script>

</body>
</html>
