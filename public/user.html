<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Usuario</title>
<base href="/IA-Lovers/public/">

<link rel="stylesheet" href="/IA-Lovers/public/assets/css/style.css">
<link rel="stylesheet" href="/IA-Lovers/public/assets/css/post.css">
<link rel="stylesheet" href="/IA-Lovers/public/assets/css/profile.css">

</head>
<body>

<nav class="navbar">
<div class="logo">IA-<span class="highlight">Lovers</span></div>
<div id="nav-auth"></div>
</nav>

<section class="feed">
<div id="profile"></div>
<div id="posts"></div>
</section>

<script src="/IA-Lovers/public/assets/js/header.js"></script>
<script src="/IA-Lovers/public/assets/js/posts.js"></script>

<script>

const username =
    new URLSearchParams(window.location.search).get("username")
    || window.location.pathname.split("/").pop();

if(!username){
    window.location.href="/IA-Lovers/public/index.html";
}

fetch(API + "/users/username?username=" + encodeURIComponent(username),{
headers: token ? {"Authorization":"Bearer "+token} : {}
})
.then(res=>res.json())
.then(data=>{

if(!data.user){
    document.getElementById("profile").innerHTML="<p>Usuario no encontrado</p>";
    return;
}

let button="";

if(token){

button=`
<button onclick="toggleFollow(${data.user.id})">
${data.is_following ? "Dejar de seguir" : "Seguir"}
</button>
`;

}

document.getElementById("profile").innerHTML=`
<img src="/IA-Lovers/public/assets/images/logo.jpg" class="profile-pic">

<h2>${data.user.username}</h2>

<p><strong>Seguidores:</strong> ${data.followers}</p>

${button}

<hr>
`;

renderPosts(data.posts,"posts");

});

function toggleFollow(id){

fetch(API + "/follow",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({user_id:id})
})
.then(()=>location.reload());

}

</script>

</body>
</html>
