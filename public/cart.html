<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Carrito - IA Lovers</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">IA-<span class="highlight">Lovers</span></div>
    <div id="nav-auth"></div>
</nav>

<section style="padding:40px;max-width:1000px;margin:auto;">
    <h2>Mi Carrito</h2>
    <div id="cart-container"></div>
</section>

<script src="assets/js/header.js"></script>

<script>
const token = localStorage.getItem("token");

if (!token) {
    window.location.href = "login.html?redirect=cart.html";
}

fetch("../api/index.php/cart", {
    headers: {
        "Authorization": "Bearer " + token
    }
})
.then(res => {
    if (res.status === 401) {
        localStorage.clear();
        window.location.href = "login.html?redirect=cart.html";
    }
    return res.json();
})
.then(items => {

    const container = document.getElementById("cart-container");

    if (!items.length) {
        container.innerHTML = `
            <div class="card">
                <p>Tu carrito está vacío.</p>
                <a href="explorar.html" class="btn-primary">Explorar contenido</a>
            </div>
        `;
        return;
    }

    items.forEach(post => {
        container.innerHTML += `
            <div class="card">
                <h3>${post.title}</h3>
                <img src="${post.file_path}" style="max-width:100%;border-radius:10px;">
                <div style="margin-top:15px;">
                    <button onclick="removeFromCart(${post.id})" class="btn-secondary">
                        Eliminar
                    </button>
                </div>
            </div>
        `;
    });
});

function removeFromCart(postId) {

    fetch("../api/index.php/cart/remove", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ post_id: postId })
    })
    .then(res => res.json())
    .then(() => location.reload());
}
</script>

</body>
</html>
