<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restaurar contraseña - IA Lovers</title>
    <link rel="shortcut icon" href="assets/images/logo.png" />
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link rel="stylesheet" href="assets/css/header.css">
    <script type="module" src="assets/js/vendor/altcha.min.js"></script>
</head>
<body>

<nav class="navbar"></nav>

<div class="auth-container">
    <div class="auth-card auth-card-reset">
        <div id="passwordResetDataStep" class="auth-step auth-step-active">
            <h2>Restaurar contraseña</h2>
            <p>Te enviaremos un codigo para crear una nueva contraseña.</p>

            <form id="passwordResetStartForm" class="auth-form" data-mode="password-reset" onsubmit="startPasswordReset(event)">
                <input type="email" id="reset-email" placeholder="Email" autocomplete="email" required>

                <div class="auth-altcha-shell">
                    <altcha-widget
                        id="password-reset-altcha"
                        challengeurl="../api/altcha/challenge"
                        blockspam="false"
                    ></altcha-widget>
                </div>

                <div class="auth-status" aria-live="polite"></div>
                <button type="submit" class="btn-primary">Enviar codigo</button>
            </form>
        </div>

        <div id="passwordResetVerifyStep" class="auth-step hidden" aria-hidden="true">
            <h2>Nueva contraseña</h2>
            <p id="passwordResetEmailText">Introduce el codigo que te hemos enviado.</p>

            <form id="passwordResetVerifyForm" class="auth-form" onsubmit="completePasswordReset(event)">
                <input type="text" id="password-reset-code" placeholder="Codigo de 6 digitos" inputmode="numeric" autocomplete="one-time-code" maxlength="6" required>
                <div class="password-wrapper">
                    <input type="password" id="reset-password" placeholder="Nueva contraseña" autocomplete="new-password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('reset-password', this)" aria-label="Mostrar contraseña">
                        <svg class="eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                        <svg class="eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <div class="password-wrapper">
                    <input type="password" id="reset-password-confirm" placeholder="Repite la nueva contraseña" autocomplete="new-password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('reset-password-confirm', this)" aria-label="Mostrar contraseña">
                        <svg class="eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                        <svg class="eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <div class="auth-status" aria-live="polite"></div>
                <button type="submit" class="btn-primary">Cambiar contraseña</button>
            </form>

            <div class="auth-inline-actions">
                <button type="button" id="passwordResetResendButton" class="auth-link-btn" onclick="resendPasswordResetCode()">Reenviar codigo</button>
                <button type="button" class="auth-link-btn auth-link-btn-danger" onclick="cancelPasswordResetFlow()">Cancelar</button>
            </div>
        </div>

        <div class="auth-footer">
            <a id="login-link">Volver a iniciar sesion</a>
        </div>
    </div>
</div>

<script src="assets/js/header.js?v=20260326-2"></script>
<script src="assets/js/auth.js?v=20260504-1"></script>
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</body>
</html>
