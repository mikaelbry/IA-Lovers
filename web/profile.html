<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Mi Perfil</title>
        <link rel="shortcut icon" href="assets/images/logo.png" />
        <link rel="stylesheet" href="assets/css/style.css">
        <link rel="stylesheet" href="assets/css/post.css">
        <link rel="stylesheet" href="assets/css/profile.css">
        <link rel="stylesheet" href="assets/css/header.css">
    </head>
    <body>
        <nav class="navbar"></nav>
        <section class="feed">
            <div id="profile"></div>
            <div id="posts"></div>
        </section>
        <div id="followModal" class="hidden">
            <div class="modal-content">
                <span id="closeModal" style="cursor:pointer;">&times;</span>
                <h3 id="modalTitle"></h3>
                <ul id="modalList"></ul>
            </div>
        </div>
        <script src="assets/js/header.js?v=20260326-2"></script>
        <script defer src="assets/js/posts.js?v=20260326-2"></script>
        <script>
const token = localStorage.getItem("token");
let myUser = null;
let myFollowing = [];

if (!token) {
    window.location.href = "login.html";
}

async function requestJson(url, options = {}) {
    const res = await fetch(url, options);
    const data = await res.json();

    if (!res.ok) {
        throw new Error(data.error || "Error");
    }

    return data;
}

async function loadProfile() {
    const data = await requestJson(apiUrl("/users/profile"), {
        headers: { Authorization: "Bearer " + token }
    });

    myUser = data.user;

    const followersData = await requestJson(apiUrl("/users/followers"), {
        headers: { Authorization: "Bearer " + token }
    });

    const followingData = await requestJson(apiUrl("/users/following"), {
        headers: { Authorization: "Bearer " + token }
    });

    myFollowing = followingData;

    document.getElementById("profile").innerHTML = `
        <img src="assets/images/logo.jpg" class="profile-pic">
        <h2>${data.user.username} (Tú)</h2>
        <p>Email: ${data.user.email}</p>
        <p>
            <strong id="followersBtn" style="cursor:pointer;">Seguidores:</strong> ${followersData.length} |
            <strong id="followingBtn" style="cursor:pointer;">Siguiendo:</strong> ${followingData.length}
        </p>
        <hr>
    `;

    renderPosts(data.posts, "posts");

    document.getElementById("followersBtn")
        .addEventListener("click", () => showFollowPopup("Seguidores", followersData));

    document.getElementById("followingBtn")
        .addEventListener("click", () => showFollowPopup("Siguiendo", followingData));
}

const modal = document.getElementById("followModal");
const closeBtn = document.getElementById("closeModal");

closeBtn.onclick = closeModal;

modal.addEventListener("click", (e) => {
    if (e.target === modal) {
        closeModal();
    }
});

function closeModal() {
    modal.classList.add("hidden");
    document.body.style.overflow = "";
}

function showFollowPopup(title, list) {
    document.body.style.overflow = "hidden";

    const ul = document.getElementById("modalList");
    document.getElementById("modalTitle").textContent = title;
    ul.innerHTML = "";

    list.forEach(u => {
        const isMe = u.username === myUser.username;
        const isFollowing = myFollowing.some(f => f.username === u.username);

        ul.innerHTML += `
            <li class="follow-item">
                <a href="${publicUrl("user.html")}?username=${encodeURIComponent(u.username)}">
                    ${isMe ? u.username + " (Tú)" : u.username}
                </a>
                ${
                    isMe ? "" :
                    `<button class="follow-btn ${isFollowing ? "unfollow" : ""}" type="button"
                        onclick="toggleFollow('${u.username}')">
                        ${isFollowing ? "Siguiendo" : "Seguir"}
                    </button>`
                }
            </li>
        `;
    });

    modal.classList.remove("hidden");
}

function toggleFollow(username) {
    fetch(apiUrl("/follow"), {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token
        },
        body: JSON.stringify({ username })
    }).then(() => location.reload());
}

loadProfile().catch(error => alert(error.message));
        </script>
    </body>
</html>
