<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ajustes del perfil</title>
    <link rel="shortcut icon" href="assets/images/logo.png" />
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/header.css">
    <link rel="stylesheet" href="assets/css/profile-settings.css?v=20260406-2">
</head>
<body>

<nav class="navbar"></nav>

<section class="settings-shell">
    <div class="settings-hero">
        <h1>Ajustes de la cuenta</h1>
        <a href="profile.html" class="settings-back-link">Volver al perfil</a>
    </div>

    <div class="settings-grid">
        <aside class="settings-column">
            <section class="settings-card settings-profile-card">
                <div class="settings-profile-top"></div>
                <div class="settings-avatar-wrap">
                    <img src="assets/images/logo.jpg" alt="Avatar del perfil" class="settings-avatar" id="summaryAvatar">
                </div>
                <div class="settings-card-content">
                    <h2 id="profileName">Cargando...</h2>
                    <p id="profileEmail" class="settings-profile-email">Preparando tu informacion...</p>
                    <div class="settings-created">
                        <strong>Cuenta creada el:</strong>
                        <span id="createdAtText">Cargando fecha...</span>
                    </div>
                </div>
            </section>

            <section class="settings-card settings-nav-card">
                <div class="settings-card-content">
                    <h3>Opciones</h3>
                    <div class="settings-nav-list" id="settingsNav">
                        <button type="button" class="settings-nav-button active" data-section="account"><strong>Informacion de cuenta</strong></button>
                        <button type="button" class="settings-nav-button" data-section="avatar"><strong>Cambiar avatar</strong></button>
                        <button type="button" class="settings-nav-button" data-section="username"><strong>Cambiar nombre de usuario</strong></button>
                        <button type="button" class="settings-nav-button" data-section="email"><strong>Cambiar correo</strong></button>
                        <button type="button" class="settings-nav-button" data-section="password"><strong>Cambiar contraseña</strong></button>
                        <button type="button" class="settings-nav-button settings-nav-button-danger" data-section="delete"><strong>Borrar la cuenta</strong></button>
                    </div>
                </div>
            </section>
        </aside>

        <section class="settings-card settings-form-card">
            <div class="settings-card-content">
                <h3 id="panelTitle">Informacion de cuenta</h3>
                <form id="settingsForm">
                    <div id="panelBody"></div>
                    <div class="settings-actions hidden" id="settingsActions">
                        <div id="formStatus" class="settings-status"></div>
                        <div class="settings-button-row" id="panelButtons">
                            <button type="button" id="cancelButton" class="settings-secondary-btn">Cancelar</button>
                            <button type="submit" id="saveButton" class="settings-primary-btn">Guardar cambios</button>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </div>
</section>

<script src="assets/js/header.js?v=20260326-2"></script>
<script src="assets/js/profile-settings.js?v=20260406-2"></script>
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</body>
</html>
