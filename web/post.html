<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Post</title>
    <link rel="shortcut icon" href="assets/images/logo.png" />
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/post.css">
    <link rel="stylesheet" href="assets/css/header.css">
</head>
<body>

<nav class="navbar"></nav>

<section class="feed post-detail-page">
    <div id="post"></div>
    <div id="comments"></div>
</section>

<button class="back-btn back-btn-floating" type="button" onclick="goBack()">← Volver</button>

<script src="assets/js/header.js?v=20260405-3"></script>
<script>
const params = new URLSearchParams(window.location.search);
const postId = params.get('id');
const token = localStorage.getItem('token');
const storedUser = JSON.parse(localStorage.getItem('user') || 'null');

let allComments = [];
let commentStack = [];

function formatDate(dateString) {
    const d = new Date(dateString);
    return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')} - ${d.getDate().toString().padStart(2, '0')}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getFullYear()}`;
}

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    }[char]));
}

function getInitial(value) {
    return escapeHtml(String(value || 'I').trim().charAt(0).toUpperCase() || 'I');
}

function renderUserAvatar(user, className) {
    const username = user?.username ?? '';

    if (user?.avatar_url) {
        return `<img src="${escapeHtml(user.avatar_url)}" alt="Avatar de ${escapeHtml(username)}" class="${className}">`;
    }

    return `<span class="${className} avatar-initial" aria-label="Avatar de ${escapeHtml(username)}">${getInitial(username)}</span>`;
}

function getProfileUrl(username) {
    if (storedUser && storedUser.username === username) {
        return publicUrl('profile.html');
    }

    return `${publicUrl('user.html')}?username=${encodeURIComponent(username)}`;
}

async function requestJson(url, options = {}) {
    return await window.requestApiJson(url, options);
}

async function loadPost() {
    if (!postId) {
        document.getElementById('post').innerHTML = '<p>Post no encontrado.</p>';
        return;
    }

    const data = await requestJson(apiUrl(`/posts/show?id=${encodeURIComponent(postId)}`), {
        headers: token ? { Authorization: 'Bearer ' + token } : {}
    });

    const post = data.post;
    const tagsHTML = post.tags
        ? post.tags.split(',').map(tag => `
            <span class="tag" onclick="goToTag('${encodeURIComponent(tag.trim())}', event)">#${escapeHtml(tag.trim())}</span>
        `).join('')
        : '';

    document.getElementById('post').innerHTML = `
        <article class="post-detail-card">
            <div class="post-detail-header">
                <a href="${getProfileUrl(post.username)}" class="post-detail-author-link">
                    ${renderUserAvatar(post, 'post-detail-avatar')}
                    <div class="post-detail-author-meta">
                        <h2>${escapeHtml(post.username)}</h2>
                        <div class="post-meta">${formatDate(post.created_at)}</div>
                    </div>
                </a>
            </div>

            <img src="${escapeHtml(post.file_path)}" class="post-image2" alt="${escapeHtml(post.title)}">

            <div class="post-title">${escapeHtml(post.title)}</div>
            <div class="post-description">${escapeHtml(post.description ?? '')}</div>
            <div class="post-tags">${tagsHTML}</div>
            <div class="post-actions post-detail-actions">
                <button id="likeBtn" type="button" class="like-btn ${post.liked_by_user == 1 ? 'liked' : ''}" onclick="toggleLike()">
                    ❤ <span id="likeCount">${post.likes_count}</span>
                </button>
                <span id="commentCount">💬 ${post.comments_count}</span>
            </div>
        </article>
    `;

    allComments = Array.isArray(data.comments) ? data.comments : [];

    const activeThreadId = commentStack[commentStack.length - 1] || null;
    renderComments(activeThreadId);
}

async function toggleLike() {
    if (!token) {
        window.location.href = 'login.html';
        return;
    }

    try {
        const data = await requestJson(apiUrl('/posts/toggle-like'), {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                Authorization: 'Bearer ' + token
            },
            body: JSON.stringify({ post_id: postId })
        });

        const btn = document.getElementById('likeBtn');
        const countEl = document.getElementById('likeCount');
        const count = parseInt(countEl.textContent, 10);

        if (data.liked) {
            btn.classList.add('liked');
            countEl.textContent = count + 1;
        } else {
            btn.classList.remove('liked');
            countEl.textContent = count - 1;
        }
    } catch (error) {
        if (error.authRedirected) {
            return;
        }
        alert(error.message);
    }
}

function buildTree(comments) {
    const map = {};
    const roots = [];

    comments.forEach(comment => {
        map[comment.id] = { ...comment, children: [] };
    });

    Object.values(map).forEach(comment => {
        if (comment.parent_id && map[comment.parent_id]) {
            map[comment.parent_id].children.push(comment);
        } else {
            roots.push(comment);
        }
    });

    return roots;
}

function flattenComments(comment, map) {
    map[comment.id] = comment;
    comment.children.forEach(child => flattenComments(child, map));
}

function countAllDescendants(comment) {
    let count = comment.children.length;
    comment.children.forEach(child => {
        count += countAllDescendants(child);
    });
    return count;
}

function renderComments(parentId) {
    const container = document.getElementById('comments');
    const tree = buildTree(allComments);

    container.innerHTML = `
        <section class="comments-section">
            <div class="comments-topbar">
                <h3>Comentarios</h3>
                ${commentStack.length > 0 ? '<button type="button" class="reply-back" onclick="goBackComment()">← Volver al hilo anterior</button>' : ''}
            </div>
            <div id="commentsBody"></div>
        </section>
    `;

    const commentsBody = document.getElementById('commentsBody');
    let commentsToRender = tree;

    if (parentId) {
        const flatMap = {};
        tree.forEach(root => flattenComments(root, flatMap));

        const parentComment = flatMap[parentId];
        commentsToRender = parentComment ? parentComment.children : [];

        if (parentComment) {
            const parentDiv = renderSingleComment(parentComment, true);
            commentsBody.appendChild(parentDiv);
            renderFormAfter(parentDiv, parentId);
        }
    } else {
        renderForm(commentsBody, null, true);
    }

    commentsToRender.forEach(comment => {
        commentsBody.appendChild(renderSingleComment(comment, false));
    });
}

function renderSingleComment(comment, isParent = false) {
    const div = document.createElement('div');
    div.className = `comment ${isParent ? 'comment-parent-focus' : ''}`;

    const descendants = countAllDescendants(comment);
    const authorUrl = getProfileUrl(comment.username);

    div.innerHTML = `
        <div class="comment-header">
            <a href="${authorUrl}" class="comment-author-link">
                ${renderUserAvatar(comment, 'comment-avatar')}
                <div>
                    <strong>${escapeHtml(comment.username)}</strong>
                    <div class="comment-date">${formatDate(comment.created_at)}</div>
                </div>
            </a>
        </div>
        <p>${escapeHtml(comment.content)}</p>
        <div class="comment-actions">
            <button type="button" onclick="enterThread(${comment.id})">Responder</button>
            ${descendants > 0 ? `<span class="view-replies" onclick="enterThread(${comment.id})">${descendants} respuestas</span>` : ''}
        </div>
    `;

    return div;
}

function renderForm(container, parentId, isRoot = false) {
    const form = document.createElement('div');
    form.className = 'comment-form';
    form.innerHTML = `
        <textarea id="commentInput" placeholder="Escribe un comentario..."></textarea>
        <button type="button" onclick="addComment(${parentId === null ? 'null' : parentId})">Comentar</button>
    `;

    if (isRoot) {
        container.prepend(form);
    } else {
        container.appendChild(form);
    }
}

function renderFormAfter(commentDiv, parentId) {
    const form = document.createElement('div');
    form.className = 'comment-form';
    form.innerHTML = `
        <textarea id="commentInput" placeholder="Escribe un comentario..."></textarea>
        <button type="button" onclick="addComment(${parentId})">Comentar</button>
    `;
    commentDiv.after(form);
}

function enterThread(commentId) {
    commentStack.push(commentId);
    renderComments(commentId);
}

function goBackComment() {
    commentStack.pop();
    renderComments(commentStack[commentStack.length - 1] || null);
}

async function addComment(parentId = null) {
    if (!token) {
        window.location.href = 'login.html';
        return;
    }

    const input = document.querySelector('#commentInput');
    const content = input?.value.trim();

    if (!content) {
        return;
    }

    try {
        await requestJson(apiUrl('/comments/create'), {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                Authorization: 'Bearer ' + token
            },
            body: JSON.stringify({ post_id: postId, content, parent_id: parentId })
        });

        await loadPost();
    } catch (error) {
        if (error.authRedirected) {
            return;
        }
        alert(error.message);
    }
}

function goBack() {
    window.history.back();
}

function goToTag(tag, event) {
    event.stopPropagation();
    window.location.href = `${publicUrl('explorar.html')}?tag=${tag}`;
}

loadPost().catch(error => {
    if (error.authRedirected) {
        return;
    }
    alert(error.message);
});
</script>
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</body>
</html>
