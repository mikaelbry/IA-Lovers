<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - IA Lovers</title>
    <link rel="shortcut icon" href="assets/images/logo.png" />
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link rel="stylesheet" href="assets/css/header.css">
    <script type="module" src="assets/js/vendor/altcha.min.js"></script>
</head>
<body>

<nav class="navbar"></nav>
<div class="auth-container">
    <div class="auth-card auth-card-login">
        <h2>Bienvenido</h2>
        <p>Inicia sesion para continuar</p>

        <form class="auth-form" data-mode="login" onsubmit="login(event)">
            <input type="email" id="email" placeholder="Email" autocomplete="email" required>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="contraseña" autocomplete="current-password" required>
                <button type="button" class="password-toggle" onclick="togglePassword('password', this)" aria-label="Mostrar contraseña">
                    <svg class="eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                    <svg class="eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>

            <div class="auth-altcha-shell">
                <altcha-widget
                    id="login-altcha"
                    challengeurl="../api/altcha/challenge"
                    blockspam="false"
                ></altcha-widget>
            </div>

            <div class="auth-status" aria-live="polite"></div>
            <button type="submit" class="btn-primary">Entrar</button>
        </form>

        <div class="auth-secondary-link">
            <a id="forgot-password-link">He olvidado mi contraseña</a>
        </div>

        <div class="auth-footer">
            ¿No tienes cuenta?
            <a id="register-link">Crear cuenta</a>
        </div>
    </div>
</div>

<script src="assets/js/header.js?v=20260405-4"></script>
<script src="assets/js/auth.js?v=20260504-1"></script>
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>

</body>
</html>
